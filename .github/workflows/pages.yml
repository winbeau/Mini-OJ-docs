name: Deploy tutorial to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp ./*.html _site/
          cp ./*.md   _site/
          rm -f judge/judge                          # 不打包二进制(平台相关)
          cp -r judge  _site/judge                   # 源码可单文件下载 judge/judge.cpp
          tar -czf _site/judge-bundle.tar.gz judge   # 完整判题机打包下载(源码+Makefile+示例)
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3   # 默认上传 _site
      - id: deployment
        uses: actions/deploy-pages@v4
